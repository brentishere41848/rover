<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Dashboard</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/dashboard.js"></script>
  </head>
  <body class="dashboard-shell">
    <main class="dashboard-wrap">
      <section class="dashboard-card">
        <div class="status-pill">Authentication complete</div>
        <h1 id="welcome-title">Loading dashboard...</h1>
        <p id="welcome-copy">Retrieving account details.</p>
        <div class="profile-grid" id="profile-grid"></div>
        <button id="logout-button" class="secondary-button" type="button">Log out</button>
      </section>
    </main>
  </body>
</html>
